<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>

  p { font-size: 14px; line-height: 2; color: #666; }
  .btn-wrap { display: flex; gap: 12px; justify-content: center; margin-top: 28px; flex-wrap: wrap; }
  .btn-primary { background: #2BBCD4; color: white; padding: 12px 32px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 700; }
  .btn-secondary { background: #f0f9fb; color: #2BBCD4; border: 1px solid #2BBCD4; padding: 12px 32px; border-radius: 8px; text-decoration: none; font-size: 14px; }
  .footer { margin-top: 32px; padding-top: 20px; border-top: 1px solid #eee; font-size: 12px; color: #aaa; text-align: center; line-height: 1.8; }
</style>
</head>
