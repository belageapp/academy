<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ | ホリスケアアカデミー</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #3A7D44;
      --green-dark: #2A5E32;
      --green-mid: #5A9E64;
      --green-light: #E8F5EA;
      --green-pale: #F3FAF4;
      --orange: #E8823A;
      --orange-light: #FEF3E8;
      --white: #FFFFFF;
      --bg: #F2F5F2;
      --text: #1E2820;
      --text-mid: #5A6B5C;
      --text-light: #9AAD9C;
      --border: #D4E6D6;
      --shadow: rgba(58,125,68,0.10);
      --red: #D94040;
      --blue: #3A7DB8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ===== ヘッダー ===== */
    .header {
      background: linear-gradient(135deg, var(--green-dark), var(--green));
      color: white; padding: 0 20px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .header-logo { font-size: 15px; font-weight: 700; letter-spacing: 0.05em; }
    .header-logo span { font-size: 11px; font-weight: 400; opacity: 0.8; margin-left: 8px; }
    .header-user { font-size: 12px; opacity: 0.9; display: flex; align-items: center; gap: 10px; }
    .header-user button {
      background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
      color: white; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;
      font-family: inherit;
    }
    .header-user button:hover { background: rgba(255,255,255,0.3); }

    /* ===== レイアウト ===== */
    .container { max-width: 800px; margin: 0 auto; padding: 20px 16px 60px; }

    /* ===== カード ===== */
    .card {
      background: var(--white); border-radius: 12px; padding: 20px;
      margin-bottom: 16px; box-shadow: 0 1px 6px var(--shadow);
      border: 1px solid var(--border);
    }
    .card-title {
      font-size: 14px; font-weight: 700; color: var(--green-dark);
      margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    }
    .card-icon {
      width: 28px; height: 28px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .icon-green { background: var(--green-light); }
    .icon-orange { background: var(--orange-light); }

    /* ===== 申込情報 ===== */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .info-item { background: var(--green-pale); border-radius: 8px; padding: 10px 12px; }
    .info-label { font-size: 10px; color: var(--text-mid); margin-bottom: 2px; }
    .info-value { font-size: 13px; font-weight: 700; color: var(--text); }

    /* ===== ステータスバッジ ===== */
    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700;
    }
    .status-入金待ち { background: #FFF8E1; color: #F57C00; border: 1px solid #FFE082; }
    .status-受講確定 { background: var(--green-light); color: var(--green-dark); border: 1px solid #A5D6A7; }
    .status-未対応 { background: #F3F4F6; color: #6B7280; border: 1px solid #D1D5DB; }
    .status-キャンセル { background: #FEF2F2; color: #DC2626; border: 1px solid #FCA5A5; }

    /* ===== eラーニング リスト ===== */
    .task-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 0; border-bottom: 1px solid var(--border);
    }
    .task-item:last-child { border-bottom: none; }
    .task-num {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--border); color: var(--text-mid);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
    }
    .task-name { font-size: 12px; font-weight: 700; color: var(--text); line-height: 1.4; }
    .task-status {
      flex-shrink: 0; font-size: 11px; font-weight: 700;
      padding: 3px 8px; border-radius: 10px;
    }
    .task-合格 { background: var(--green-light); color: var(--green-dark); }
    .task-未提出 { background: #F3F4F6; color: #6B7280; }
    .task-btn {
      flex-shrink: 0; padding: 5px 10px; border-radius: 6px;
      border: none; color: white; font-size: 11px; font-weight: 700;
      cursor: pointer; font-family: inherit; background: var(--green);
    }
    .task-btn:hover { opacity: 0.85; }

    /* ===== モーダル ===== */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      display: flex; align-items: flex-start; justify-content: center;
      z-index: 200; overflow-y: auto; padding: 16px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-box {
      background: white; border-radius: 14px; width: 100%; max-width: 680px;
      min-height: 300px; margin: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
      transform: translateY(20px); transition: transform 0.2s;
      overflow: hidden;
    }
    .modal-overlay.open .modal-box { transform: translateY(0); }
    .modal-header {
      background: linear-gradient(135deg, var(--green-dark), var(--green));
      color: white; padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 13px; font-weight: 700; line-height: 1.4; }
    .modal-close {
      background: rgba(255,255,255,0.2); border: none; color: white;
      width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
      font-size: 16px; display: flex; align-items: center; justify-content: center;
      font-family: inherit; flex-shrink: 0; margin-left: 10px;
    }
    .modal-close:hover { background: rgba(255,255,255,0.35); }
    .modal-content { padding: 18px 20px 24px; }

    /* ===== クイズ UI ===== */
    .quiz-theme-label {
      display: inline-block; background: var(--green-light); color: var(--green-dark);
      font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 4px;
      margin-bottom: 14px;
    }

    /* プログレスバー */
    .quiz-progress-bar-wrap { margin-bottom: 12px; }
    .quiz-progress-meta {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: var(--text-mid); margin-bottom: 4px;
    }
    .quiz-progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .quiz-progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.3s; }

    /* 問題番号ナビ */
    .quiz-nav-wrap { margin-bottom: 14px; }
    .quiz-nav-label { font-size: 11px; color: var(--text-mid); margin-bottom: 6px; }
    .quiz-nav-dots { display: flex; flex-wrap: wrap; gap: 5px; }
    .quiz-nav-dot {
      width: 30px; height: 30px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; cursor: pointer;
      border: 2px solid var(--border); background: white; color: var(--text-mid);
      transition: all 0.15s;
    }
    .quiz-nav-dot.current { border-color: var(--green); color: var(--green); background: var(--green-pale); }
    .quiz-nav-dot.answered { background: #EEF2FF; border-color: #818CF8; color: #4F46E5; }
    .quiz-nav-dot:hover:not(.current) { border-color: var(--green-mid); }

    /* 参照ページ案内 */
    .quiz-ref-box {
      background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 8px;
      padding: 8px 12px; margin-bottom: 12px;
      font-size: 12px; color: #92400E; display: flex; gap: 6px; align-items: flex-start;
    }

    /* 問題 */
    .quiz-question-num { font-size: 11px; color: var(--text-mid); margin-bottom: 4px; }
    .quiz-question-text {
      font-size: 14px; font-weight: 700; color: var(--text);
      line-height: 1.7; margin-bottom: 14px;
    }
    .quiz-choices { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .quiz-choice {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 12px; border: 2px solid var(--border); border-radius: 8px;
      cursor: pointer; transition: all 0.15s; font-size: 13px; line-height: 1.5;
    }
    .quiz-choice:hover { border-color: var(--green-mid); background: var(--green-pale); }
    .quiz-choice.selected { border-color: var(--green); background: var(--green-pale); }
    .quiz-choice-num {
      width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
      background: var(--border); color: var(--text-mid);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; margin-top: 1px;
    }
    .quiz-choice.selected .quiz-choice-num { background: var(--green); color: white; }

    /* ボタン行 */
    .quiz-btn-row {
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    }
    .quiz-btn {
      padding: 10px 14px; border: none; border-radius: 8px;
      font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: opacity 0.15s; white-space: nowrap;
    }
    .quiz-btn:hover:not(:disabled) { opacity: 0.85; }
    .quiz-btn:disabled { opacity: 0.4; cursor: default; }
    .quiz-btn-prev { background: #F3F4F6; color: #374151; }
    .quiz-btn-pause { background: #FEF3E8; color: #92400E; border: 1px solid #FDE68A; }
    .quiz-btn-next { background: var(--green); color: white; flex: 1; }
    .quiz-btn-submit { background: var(--orange); color: white; flex: 1; }

    /* 結果画面 */
    .quiz-result-header { text-align: center; padding: 10px 0 18px; }
    .quiz-result-score { font-size: 52px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
    .quiz-result-score.pass { color: var(--green-dark); }
    .quiz-result-score.fail { color: var(--red); }
    .quiz-result-label { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
    .quiz-result-detail { font-size: 13px; color: var(--text-mid); line-height: 1.8; }

    /* 採点一覧 */
    .quiz-result-list { margin: 16px 0; }
    .quiz-result-list-title {
      font-size: 13px; font-weight: 700; margin-bottom: 8px;
      padding-bottom: 6px; border-bottom: 2px solid var(--border);
    }
    .quiz-result-row {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid var(--border);
      font-size: 12px; line-height: 1.5;
    }
    .quiz-result-row:last-child { border-bottom: none; }
    .quiz-result-row-icon { flex-shrink: 0; font-size: 14px; padding-top: 1px; }
    .quiz-result-row-body { flex: 1; }
    .quiz-result-row-qtext { color: var(--text); }
    .quiz-result-row-wrong-info { color: var(--red); font-size: 11px; margin-top: 2px; }

    .quiz-result-btns { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .quiz-result-btn {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .quiz-result-btn:hover { opacity: 0.85; }
    .quiz-result-btn.primary { background: var(--green); color: white; }
    .quiz-result-btn.secondary { background: #6c8ebf; color: white; }
    .quiz-result-btn.tertiary { background: #888; color: white; }

    /* 復習モード */
    .review-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
    .review-item:last-child { border-bottom: none; }
    .review-q { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 6px; line-height: 1.6; }
    .review-ans {
      font-size: 12px; color: var(--green-dark); font-weight: 700;
      background: var(--green-pale); border-radius: 6px; padding: 4px 10px;
      display: inline-block;
    }
    .review-ref { font-size: 11px; color: var(--text-mid); margin-top: 4px; }

    /* ローディング */
    #loading-overlay {
      position: fixed; inset: 0; background: rgba(255,255,255,0.9);
      display: flex; align-items: center; justify-content: center;
      z-index: 300; font-size: 13px; color: var(--text-mid);
    }

    @media (max-width: 480px) {
      .info-grid { grid-template-columns: 1fr; }
      .quiz-nav-dot { width: 26px; height: 26px; font-size: 10px; }
      .quiz-btn-row { gap: 6px; }
    }
  </style>
</head>
<body>

<div id="loading-overlay">読み込み中...</div>

<!-- ヘッダー -->
<div class="header">
  <div class="header-logo">ホリスケアアカデミー <span>マイページ</span></div>
  <div class="header-user">
    <span id="header-email"></span>
    <button onclick="doLogout()">ログアウト</button>
  </div>
</div>

<div class="container" id="main-container" style="display:none;">
  <!-- 申込情報 -->
  <div class="card">
    <div class="card-title"><div class="card-icon icon-green">📋</div>申込情報</div>
    <div id="app-content">読み込み中...</div>
  </div>

  <!-- 動画教材 -->
  <div class="card">
    <div class="card-title"><div class="card-icon icon-green">🎬</div>動画教材</div>
    <div id="video-content">読み込み中...</div>
  </div>

  <!-- eラーニング -->
  <div class="card">
    <div class="card-title"><div class="card-icon icon-orange">📚</div>eラーニング</div>
    <div style="font-size:11px;color:var(--text-light);margin-bottom:12px;line-height:1.7;">
      テキストで各テーマを学習後、確認問題に答えてください。<br>前のテーマに合格（70%以上）すると次のテーマが解放されます。
    </div>
    <div id="task-list"><span style="color:var(--text-light);font-size:13px;">読み込み中...</span></div>
  </div>

  <!-- 領収書 -->
  <div class="card" id="receipt-card" style="display:none;">
    <div class="card-title"><div class="card-icon icon-green">🧾</div>領収書</div>
    <div id="receipt-content"></div>
  </div>
</div>

<!-- クイズモーダル -->
<div class="modal-overlay" id="task-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">eラーニング</div>
      <button class="modal-close" onclick="closeTask()">✕</button>
    </div>
    <div class="modal-content" id="modal-content"></div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import {
  getFirestore, collection, query, where, getDocs, orderBy, limit,
  doc, getDoc, setDoc
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCl48Fay9AbMLRXJ7npya4PJIgDQPvltxs",
  authDomain: "holiscare-academy.firebaseapp.com",
  projectId: "holiscare-academy",
  storageBucket: "holiscare-academy.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.__auth = auth;
window.__db = db;

// ===== 学習テーマ定義 =====
const LEARNING_THEMES = [
  { num: 1,  name: '介護における尊厳の保持・自立支援',        pdfRound: 1 },
  { num: 2,  name: '介護の基本',                               pdfRound: 1 },
  { num: 3,  name: '老化の理解',                               pdfRound: 1 },
  { num: 4,  name: '介護・福祉サービスの理解と医療との連携',    pdfRound: 2 },
  { num: 5,  name: '認知症の理解',                             pdfRound: 2 },
  { num: 6,  name: '障害の理解',                               pdfRound: 2 },
  { num: 7,  name: '介護におけるコミュニケーション技術',        pdfRound: 3 },
  { num: 8,  name: 'こころとからだのしくみと生活支援技術①',    pdfRound: 3 },
  { num: 9,  name: 'こころとからだのしくみと生活支援技術②',    pdfRound: 4 },
  { num: 10, name: 'こころとからだのしくみと生活支援技術③',    pdfRound: 5 },
];

// ===== 認証チェック =====
onAuthStateChanged(auth, async (user) => {
  document.getElementById('loading-overlay').style.display = 'none';
  if (!user) { window.location.href = 'mypage_login.html'; return; }
  document.getElementById('header-email').textContent = user.email;
  document.getElementById('main-container').style.display = 'block';
  await loadMyPage(user);
});

window.doLogout = async function() {
  await signOut(auth);
  window.location.href = 'mypage_login.html';
};

// ===== マイページ読み込み =====
async function loadMyPage(user) {
  try {
    const urlId = new URLSearchParams(window.location.search).get('id');
    let snap;
    if (urlId) {
      const docRef = doc(db, 'applications', urlId);
      const single = await getDoc(docRef);
      snap = { empty: !single.exists(), docs: single.exists() ? [single] : [] };
    } else {
      const q = query(
        collection(db, 'applications'),
        where('email', '==', user.email),
        orderBy('createdAt', 'desc'),
        limit(1)
      );
      snap = await getDocs(q);
    }
    if (snap.empty) {
      document.getElementById('app-content').innerHTML = '<p style="font-size:13px;color:var(--text-mid);">申込情報が見つかりません。</p>';
      return;
    }
    const data = snap.docs[0].data();
    const status = data.status || '未対応';

    renderAppInfo(data, status);
    renderVideoSection(status);

    const progressSnap = await getDoc(doc(db, 'users', user.uid, 'quizProgress', 'summary'));
    const progressData = progressSnap.exists() ? progressSnap.data() : {};
    renderTaskList(status, progressData);

    if (status === '受講確定') {
      document.getElementById('receipt-card').style.display = 'block';
      document.getElementById('receipt-content').innerHTML = '<p style="font-size:13px;color:var(--text-mid);">領収書の発行機能は準備中です。</p>';
    }
  } catch(e) {
    document.getElementById('app-content').innerHTML = `<p style="font-size:12px;color:var(--red);">エラー: ${e.message}</p>`;
  }
}

// ===== 申込情報 =====
function renderAppInfo(data, status) {
  const date = data.createdAt?.toDate ? data.createdAt.toDate().toLocaleDateString('ja-JP') : '—';
  document.getElementById('app-content').innerHTML = `
    <div style="margin-bottom:12px;"><span class="status-badge status-${status}">● ${status}</span></div>
    <div class="info-grid">
      <div class="info-item"><div class="info-label">受講番号</div><div class="info-value">${data.applicationId || '—'}</div></div>
      <div class="info-item"><div class="info-label">申込日</div><div class="info-value">${date}</div></div>
      <div class="info-item"><div class="info-label">お名前</div><div class="info-value">${data.name || '—'}</div></div>
      <div class="info-item"><div class="info-label">講座</div><div class="info-value" style="font-size:11px;">${data.course || '介護職員初任者研修'}</div></div>
    </div>
    ${status === '入金待ち' ? '<div style="margin-top:12px;padding:10px 12px;background:#FFF8E1;border-radius:8px;font-size:12px;color:#F57C00;">⏳ 入金確認後に受講が確定します。</div>' : ''}
  `;
}

// ===== 動画教材 =====
function renderVideoSection(status) {
  if (status !== '受講確定') {
    document.getElementById('video-content').innerHTML = `
      <div style="background:linear-gradient(135deg,#1E2820,#2A5E32);border-radius:10px;padding:24px;text-align:center;color:white;">
        <div style="font-size:28px;margin-bottom:8px;">🔒</div>
        <div style="font-size:13px;opacity:0.8;">入金確認後に利用できるようになります</div>
      </div>`;
  } else {
    document.getElementById('video-content').innerHTML = `<p style="font-size:13px;color:var(--text-mid);">動画教材は準備中です。</p>`;
  }
}

// ===== eラーニング リスト =====
function renderTaskList(status, progressData) {
  const taskList = document.getElementById('task-list');
  if (status !== '受講確定') {
    taskList.innerHTML = `<div style="padding:14px;background:#FFF8E1;border-radius:8px;font-size:12px;color:#F57C00;text-align:center;">🔒 受講確定後にeラーニングが開放されます</div>`;
    return;
  }

  taskList.innerHTML = LEARNING_THEMES.map(t => {
    const isPassed = progressData[`theme${t.num}`] === true;
    const isUnlocked = t.num === 1 || progressData[`theme${t.num - 1}`] === true;
    const locked = !isUnlocked;

    return `
      <div class="task-item" style="${locked ? 'opacity:0.4;' : ''}">
        <div class="task-num" style="${isPassed ? 'background:var(--green-light);color:var(--green-dark);' : ''}">
          ${isPassed ? '✓' : t.num}
        </div>
        <div style="flex:1;min-width:0;">
          <div class="task-name">学習${t.num}：${t.name}</div>
          ${locked ? `<div style="font-size:10px;color:#F57C00;margin-top:2px;">🔒 学習${t.num - 1}に合格すると解放</div>` : ''}
        </div>
        <span class="task-status ${isPassed ? 'task-合格' : 'task-未提出'}">${isPassed ? '合格✓' : '未学習'}</span>
        ${isPassed
          ? `<div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;">
               <button class="task-btn" style="background:#6c8ebf;font-size:10px;" onclick="window.openTask(${t.num},'review')">復習</button>
               <button class="task-btn" style="background:#888;font-size:10px;" onclick="window.openTask(${t.num},'retry')">再挑戦</button>
             </div>`
          : locked
            ? `<span style="font-size:18px;">🔒</span>`
            : `<button class="task-btn" onclick="window.openTask(${t.num},'normal')">回答する</button>`
        }
      </div>`;
  }).join('');
}

// ===== クイズロジック =====
let quizState = {};

async function loadQuizData(themeNum) {
  try {
    const res = await fetch(`/quiz/theme${themeNum}.json`);
    if (res.ok) return await res.json();
  } catch(e) {}
  // Firestoreフォールバック
  try {
    const snap = await getDoc(doc(db, 'quizData', `theme${themeNum}`));
    if (snap.exists()) return snap.data();
  } catch(e) {}
  // デモデータ
  return { questions: generateDemoQuestions(themeNum) };
}

function generateDemoQuestions(themeNum) {
  const t = LEARNING_THEMES[themeNum - 1];
  return Array.from({ length: 5 }, (_, i) => ({
    question: `（学習${themeNum}・問${i+1}）${t.name}に関する問題です。正しいものを1つ選んでください。`,
    choices: ['選択肢①', '選択肢②', '選択肢③（正解）', '選択肢④', '選択肢⑤'],
    answer: 3,
    ref: `テキスト第${themeNum}章 ${10 + i*3}ページ`
  }));
}

// モーダルを閉じる
window.closeTask = function() {
  document.getElementById('task-modal').classList.remove('open');
};

// モーダルを開く
window.openTask = async function(themeNum, mode) {
  const theme = LEARNING_THEMES[themeNum - 1];
  const modal = document.getElementById('task-modal');
  const titleEl = document.getElementById('modal-title');
  const content = document.getElementById('modal-content');

  const modeLabel = mode === 'review' ? '（復習）' : mode === 'retry' ? '（再挑戦）' : '';
  titleEl.textContent = `eラーニング　学習${themeNum}：${theme.name}${modeLabel}`;
  content.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-light);font-size:13px;">読み込み中...</div>';
  modal.classList.add('open');

  const data = await loadQuizData(themeNum);
  const questions = data.questions;

  if (mode === 'review') {
    renderReviewMode(content, questions, themeNum);
    return;
  }

  quizState = {
    themeNum,
    themeName: theme.name,
    questions,
    currentIndex: 0,
    answers: new Array(questions.length).fill(null),
    submitted: false,
  };

  if (mode === 'retry') {
    renderQuizQuestion(content);
    return;
  }

  // 通常モード: 途中保存を復元
  try {
    const user = auth.currentUser;
    if (user) {
      const snap = await getDoc(doc(db, 'users', user.uid, 'quizProgress', `theme${themeNum}`));
      if (snap.exists()) {
        const saved = snap.data();
        if (saved.passed) {
          quizState.answers = saved.answers || quizState.answers;
          quizState.submitted = true;
          quizState.results = saved.results || new Array(questions.length).fill(true);
          renderQuizResult(content);
          return;
        }
        if (saved.answers) {
          quizState.answers = saved.answers;
          const lastIdx = saved.answers.reduce((acc, a, i) => a !== null ? i : acc, -1);
          quizState.currentIndex = Math.min(lastIdx + 1, questions.length - 1);
        }
      }
    }
  } catch(e) {}

  renderQuizQuestion(content);
};

// ===== 問題画面 =====
function renderQuizQuestion(content) {
  const { themeNum, themeName, questions, currentIndex, answers } = quizState;
  const q = questions[currentIndex];
  const total = questions.length;
  const answeredCount = answers.filter(a => a !== null).length;
  const progressPct = Math.round((answeredCount / total) * 100);
  const isLast = currentIndex === total - 1;
  const allAnswered = answers.every(a => a !== null);

  // 番号ナビ
  const navDots = questions.map((_, i) => {
    let cls = i === currentIndex ? 'current' : answers[i] !== null ? 'answered' : '';
    return `<div class="quiz-nav-dot ${cls}" onclick="window.goToQuestion(${i})">${i + 1}</div>`;
  }).join('');

  // 選択肢
  const choicesHtml = q.choices.map((c, i) => {
    const num = i + 1;
    return `
      <div class="quiz-choice ${answers[currentIndex] === num ? 'selected' : ''}" onclick="window.selectChoice(${num})">
        <div class="quiz-choice-num">${num}</div>
        <div>${c}</div>
      </div>`;
  }).join('');

  content.innerHTML = `
    <div class="quiz-theme-label">学習${themeNum}：${themeName}</div>

    <div class="quiz-progress-bar-wrap">
      <div class="quiz-progress-meta">
        <span>${answeredCount}/${total}問 回答済み</span>
        <span style="color:var(--green);font-size:10px;">✅ 自動保存されています</span>
      </div>
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${progressPct}%"></div></div>
    </div>

    <div class="quiz-nav-wrap">
      <div class="quiz-nav-label">問題番号をタップして移動できます（回答済み：<span style="color:#4F46E5;">■</span>　現在：<span style="color:var(--green);">■</span>）</div>
      <div class="quiz-nav-dots">${navDots}</div>
    </div>

    ${q.ref ? `<div class="quiz-ref-box">📖 <span>テキスト <strong>${q.ref}</strong> を学習してから答えてください</span></div>` : ''}

    <div class="quiz-question-num">問題 ${currentIndex + 1} / ${total}</div>
    <div class="quiz-question-text">${q.question}</div>
    <div class="quiz-choices">${choicesHtml}</div>

    <div class="quiz-btn-row">
      <button class="quiz-btn quiz-btn-prev" onclick="window.goToPrev()" ${currentIndex === 0 ? 'disabled' : ''}>← 前の問題</button>
      <button class="quiz-btn quiz-btn-pause" onclick="window.pauseAndSave()">💾 保存して中断</button>
      ${isLast
        ? `<button class="quiz-btn quiz-btn-submit" onclick="window.submitQuiz()" ${allAnswered ? '' : 'disabled'}>
             📊 採点する${allAnswered ? '' : `（残${total - answeredCount}問）`}
           </button>`
        : `<button class="quiz-btn quiz-btn-next" onclick="window.goToNext()" ${answers[currentIndex] === null ? 'disabled' : ''}>
             次の問題 →
           </button>`
      }
    </div>
    ${isLast && !allAnswered ? `<p style="font-size:11px;color:var(--text-mid);margin-top:8px;text-align:center;">⚠️ 未回答の問題は番号ボタンから確認できます（紫色＝回答済み）</p>` : ''}
  `;
}

// 選択肢を選ぶ
window.selectChoice = function(num) {
  quizState.answers[quizState.currentIndex] = num;
  saveQuizProgressAuto();
  renderQuizQuestion(document.getElementById('modal-content'));
};

// 番号ナビでジャンプ
window.goToQuestion = function(index) {
  quizState.currentIndex = index;
  renderQuizQuestion(document.getElementById('modal-content'));
};

// 前の問題へ
window.goToPrev = function() {
  if (quizState.currentIndex > 0) {
    quizState.currentIndex--;
    renderQuizQuestion(document.getElementById('modal-content'));
  }
};

// 次の問題へ（回答必須）
window.goToNext = function() {
  if (quizState.answers[quizState.currentIndex] === null) return;
  if (quizState.currentIndex < quizState.questions.length - 1) {
    quizState.currentIndex++;
    renderQuizQuestion(document.getElementById('modal-content'));
  }
};

// 保存して中断
window.pauseAndSave = async function() {
  await saveQuizProgressAuto();
  window.closeTask();
  // リスト再描画
  const user = auth.currentUser;
  if (user) {
    try {
      const snap = await getDoc(doc(db, 'users', user.uid, 'quizProgress', 'summary'));
      renderTaskList('受講確定', snap.exists() ? snap.data() : {});
    } catch(e) {}
  }
};

// 採点実行（全問終了後）
window.submitQuiz = async function() {
  const { questions, answers, themeNum } = quizState;
  const results = questions.map((q, i) => answers[i] === q.answer);
  const correct = results.filter(r => r).length;
  const pct = Math.round((correct / questions.length) * 100);
  const isPassed = pct >= 70;
  quizState.results = results;
  quizState.submitted = true;

  try {
    const user = auth.currentUser;
    if (user) {
      await setDoc(doc(db, 'users', user.uid, 'quizProgress', `theme${themeNum}`), {
        answers, results, passed: isPassed, score: pct, submittedAt: new Date()
      });
      if (isPassed) {
        await setDoc(doc(db, 'users', user.uid, 'quizProgress', 'summary'),
          { [`theme${themeNum}`]: true }, { merge: true });
      }
    }
  } catch(e) {}

  renderQuizResult(document.getElementById('modal-content'));
};

// 自動保存
async function saveQuizProgressAuto() {
  try {
    const user = auth.currentUser;
    if (!user) return;
    await setDoc(doc(db, 'users', user.uid, 'quizProgress', `theme${quizState.themeNum}`),
      { answers: quizState.answers, savedAt: new Date() }, { merge: true });
  } catch(e) {}
}

// ===== 採点結果画面 =====
function renderQuizResult(content) {
  const { questions, answers, results, themeNum, themeName } = quizState;
  const total = questions.length;
  const correct = results.filter(r => r).length;
  const pct = Math.round((correct / total) * 100);
  const isPassed = pct >= 70;

  const listHtml = questions.map((q, i) => {
    const ok = results[i];
    const chosenLabel = answers[i] != null ? `${answers[i]}（${q.choices[answers[i]-1]}）` : '未回答';
    return `
      <div class="quiz-result-row">
        <div class="quiz-result-row-icon">${ok ? '✅' : '❌'}</div>
        <div class="quiz-result-row-body">
          <div class="quiz-result-row-qtext">Q${i+1}. ${q.question.length > 50 ? q.question.slice(0,50)+'…' : q.question}</div>
          ${!ok ? `<div class="quiz-result-row-wrong-info">あなた：${chosenLabel} ／ 正解：${q.answer}（${q.choices[q.answer-1]}）</div>` : ''}
        </div>
      </div>`;
  }).join('');

  content.innerHTML = `
    <div class="quiz-theme-label">学習${themeNum}：${themeName}</div>
    <div class="quiz-result-header">
      <div class="quiz-result-score ${isPassed ? 'pass' : 'fail'}">${pct}%</div>
      <div class="quiz-result-label">${isPassed ? '🎉 合格！' : '😢 不合格'}</div>
      <div class="quiz-result-detail">
        全${total}問中 <strong>${correct}問</strong> 正解（合格基準：70%以上）<br>
        ${isPassed
          ? '<span style="color:var(--green-dark);font-weight:700;">次のテーマが解放されました！</span>'
          : '<span style="color:var(--red);">もう一度挑戦できます。何度でも挑戦してください。</span>'
        }
      </div>
    </div>

    <div class="quiz-result-list">
      <div class="quiz-result-list-title">📋 全問 回答結果一覧</div>
      ${listHtml}
    </div>

    <div class="quiz-result-btns">
      <button class="quiz-result-btn primary" onclick="window.closeTask();location.reload();">✅ マイページに戻る</button>
      ${isPassed
        ? `<button class="quiz-result-btn secondary" onclick="window.openTask(${themeNum},'review')">📖 復習する（正解一覧）</button>`
        : `<button class="quiz-result-btn tertiary" onclick="window.openTask(${themeNum},'retry')">🔄 もう一度挑戦する</button>`
      }
    </div>
  `;
}

// ===== 復習モード =====
function renderReviewMode(content, questions, themeNum) {
  const theme = LEARNING_THEMES[themeNum - 1];
  const itemsHtml = questions.map((q, i) => `
    <div class="review-item">
      <div class="review-q">Q${i+1}. ${q.question}</div>
      <div class="review-ans">正解：${q.answer}（${q.choices[q.answer-1]}）</div>
      ${q.ref ? `<div class="review-ref">📖 参照：テキスト ${q.ref}</div>` : ''}
    </div>`).join('');

  content.innerHTML = `
    <div class="quiz-theme-label">学習${themeNum}：${theme.name}</div>
    <p style="font-size:12px;color:var(--text-mid);margin-bottom:14px;">全問の正解を確認できます。</p>
    ${itemsHtml}
    <button class="quiz-result-btn primary" style="margin-top:16px;width:100%;" onclick="window.closeTask()">閉じる</button>
  `;
}
</script>
