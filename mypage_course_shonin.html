<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>講座詳細 | ホリスケアアカデミー</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal: #2BBCD4; --teal-dark: #1A9AB0; --teal-light: #E0F7FB; --teal-pale: #F0FBFD;
      --pink: #F2708A; --pink-light: #FEF0F3;
      --yellow: #FFD84D; --yellow-light: #FFFBEB;
      --green: #4CAF72; --green-light: #EBF7EF;
      --orange: #E8823A; --orange-light: #FEF3E8;
      --white: #FFFFFF; --bg: #F2F8FA; --text: #1A3A40;
      --text-mid: #4A7A85; --text-light: #8AB8C0;
      --border: #C8EAF0; --red: #E05050;
      --shadow: rgba(43,188,212,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .header {
      background: white; border-bottom: 3px solid var(--teal);
      padding: 0 24px; height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 10px var(--shadow);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      background: none; border: 1.5px solid var(--border); color: var(--text-mid);
      border-radius: 20px; padding: 6px 14px; font-size: 12px; cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s;
    }
    .back-btn:hover { background: var(--teal-light); border-color: var(--teal); }
    .header-logo img { height: 36px; width: auto; }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .header-name { font-size: 13px; color: var(--text-mid); }
    .logout-btn {
      background: none; border: 1.5px solid var(--border); color: var(--text-mid);
      border-radius: 20px; padding: 6px 14px; font-size: 12px; cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s;
    }
    .logout-btn:hover { background: var(--teal-light); border-color: var(--teal); }
    .header-logo-row { display: none; }
    .header-main-row { display: none; }
    .header-pc-logo { display: flex; }
    .header-pc-right { display: flex; }
    @media (max-width: 480px) {
      .header-pc-logo { display: none !important; }
      .header-pc-right { display: none !important; }
    }
    @media (max-width: 480px) {
      .header { padding: 8px 12px; height: auto; flex-direction: column; align-items: stretch; gap: 6px; }
      .header-logo-row { display: flex; justify-content: center; width: 100%; }
      .header-main-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
      .header-left { gap: 8px; }
      .header-right { gap: 8px; }
      .header-name { font-size: 12px; }
      .back-btn { padding: 5px 10px; font-size: 11px; }
      .logout-btn { padding: 5px 10px; font-size: 11px; }
    }

    .course-header {
      background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
      padding: 20px 24px; color: white;
    }
    .course-header h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .course-header p { font-size: 13px; opacity: 0.85; }

    .page-wrap { max-width: 800px; margin: 0 auto; padding: 24px 16px 60px; }

    .section-title {
      font-size: 15px; font-weight: 700; color: var(--text);
      margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    }
    .section-title::before {
      content: ''; display: block; width: 4px; height: 18px;
      background: var(--teal); border-radius: 2px;
    }
    .badge-count {
      background: var(--pink); color: white; font-size: 11px; font-weight: 700;
      border-radius: 10px; padding: 1px 7px; margin-left: 4px;
    }

    /* お知らせ */
    .notice-section { margin-bottom: 28px; }
    .notice-card {
      background: white; border-radius: 12px; border: 1px solid var(--border);
      box-shadow: 0 2px 8px var(--shadow); overflow: hidden;
    }
    .notice-item {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.15s;
    }
    .notice-item:last-child { border-bottom: none; }
    .notice-item:hover { background: var(--teal-pale); }
    .notice-item.unread { background: #FFFBF0; }
    .notice-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--yellow); flex-shrink: 0; margin-top: 5px; }
    .notice-item:not(.unread) .notice-dot { background: var(--border); }
    .notice-date { font-size: 11px; color: var(--text-light); margin-bottom: 2px; }
    .notice-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
    .notice-preview { font-size: 12px; color: var(--text-mid); line-height: 1.5; }

    /* グリッド */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }

    /* カード */
    .card {
      background: white; border-radius: 12px; border: 1px solid var(--border);
      box-shadow: 0 2px 8px var(--shadow); padding: 20px;
    }
    .card-title {
      font-size: 14px; font-weight: 700; color: var(--text);
      margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    }
    .card-icon {
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    .icon-teal { background: var(--teal-light); }
    .icon-orange { background: var(--orange-light); }
    .icon-green { background: var(--green-light); }

    /* 受講内容 */
    .app-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .app-row:last-child { border-bottom: none; }
    .app-label { color: var(--text-mid); }
    .app-value { color: var(--text); font-weight: 500; }
    .status-badge {
      display: inline-block; font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
    }
    .status-入金待ち, .status-pending, .status-awaiting_payment { background: var(--yellow-light); color: #B8860B; }
    .status-受講確定, .status-confirmed { background: var(--teal-light); color: var(--teal-dark); }
    .status-動画教材完了, .status-video_done { background: var(--orange-light); color: var(--orange); }
    .status-添削課題完了, .status-task_done { background: var(--pink-light); color: var(--pink); }
    .status-OJT完了, .status-ojt_done { background: #F3E8FF; color: #7C3AED; }
    .status-修了, .status-completed { background: var(--green-light); color: #2E7D47; }
    .status-キャンセル, .status-cancelled { background: #F5F5F5; color: #888; }
    .status-未対応 { background: var(--yellow-light); color: #B8860B; }

    /* 添削課題 */
    .task-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .task-item:last-child { border-bottom: none; }
    .task-num {
      width: 26px; height: 26px; border-radius: 50%; background: var(--teal-light);
      color: var(--teal-dark); font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .task-name { font-size: 12px; color: var(--text); line-height: 1.4; }
    .task-count { font-size: 11px; color: var(--text-light); margin-top: 2px; }
    .task-status {
      font-size: 11px; font-weight: 700; padding: 2px 8px;
      border-radius: 10px; flex-shrink: 0; white-space: nowrap;
    }
    .task-未提出 { background: #F5F5F5; color: #888; }
    .task-提出済 { background: var(--yellow-light); color: #B8860B; }
    .task-合格 { background: var(--green-light); color: #2E7D47; }
    .task-btn {
      background: var(--teal); color: white; border: none; border-radius: 6px;
      padding: 5px 10px; font-size: 11px; cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif; white-space: nowrap; flex-shrink: 0;
    }
    .task-btn:hover { background: var(--teal-dark); }

    /* 動画教材 */
    .video-section { margin-bottom: 28px; }
    .video-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .video-item:last-child { border-bottom: none; }
    .video-thumb {
      width: 44px; height: 44px; border-radius: 8px; background: var(--teal-light);
      display: flex; align-items: center; justify-content: center;
      color: var(--teal); font-size: 18px; flex-shrink: 0;
    }
    .video-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
    .video-duration { font-size: 11px; color: var(--text-light); }
    .video-btn {
      background: var(--teal); color: white; border: none; border-radius: 8px;
      padding: 7px 14px; font-size: 12px; cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif; white-space: nowrap; flex-shrink: 0;
      transition: background 0.2s;
    }
    .video-btn:hover { background: var(--teal-dark); }

    /* 書類発行 */
    .doc-section { margin-bottom: 28px; }
    .flow-step { margin-bottom: 20px; }
    .flow-step-title { font-weight: bold; font-size: 14px; color: var(--text-dark); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .flow-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; margin-bottom: 6px; font-size: 13px; background: var(--bg); }
    .flow-item.done { background: #E8F5E9; color: #2E7D32; }
    .flow-item.active { background: #FFF8E1; color: #F57C00; }
    .flow-item.locked { background: var(--bg); color: var(--text-light); }
    .flow-item.rejected { background: #FFF3F3; color: #c0392b; }
    .flow-icon { font-size: 16px; min-width: 20px; text-align: center; }
    .flow-divider { border: none; border-top: 1px dashed var(--border); margin: 16px 0; }
    .doc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .doc-btn {
      background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px;
      padding: 14px 8px; cursor: pointer; text-align: center;
      font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .doc-btn:hover { border-color: var(--teal); background: var(--teal-pale); }
    .doc-icon { font-size: 24px; }
    .doc-label { font-size: 13px; font-weight: 700; color: var(--text); }
    .doc-sub { font-size: 10px; color: var(--text-light); }

    /* 課題モーダル */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 200; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 16px; width: 100%; max-width: 480px;
      max-height: 80vh; overflow-y: auto; padding: 24px;
    }
    .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
    .modal-close {
      float: right; background: none; border: none; font-size: 20px;
      cursor: pointer; color: var(--text-light); margin-top: -4px;
    }

    @media (max-width: 600px) {
      .grid-2 { grid-template-columns: 1fr; }
      .doc-grid { grid-template-columns: repeat(3, 1fr); }
      .page-wrap { padding: 20px 12px 60px; }
      .course-header { padding: 16px; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-logo-row">
    <img src="assets/logo.png" alt="ホリスケアアカデミー" style="height:36px;" onerror="this.style.display='none'">
  </div>
  <div class="header-left header-pc-logo">
    <img src="assets/logo.png" alt="ホリスケアアカデミー" style="height:36px;" onerror="this.style.display='none'">
    <button class="back-btn" onclick="window.location.href='mypage.html'">← 戻る</button>
  </div>
  <div class="header-main-row">
    <div class="header-left">
      <button class="back-btn" onclick="window.location.href='mypage.html'">← 戻る</button>
    </div>
    <div class="header-right">
      <span class="header-name" id="header-name"></span>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </div>
  <div class="header-right header-pc-right">
    <span class="header-name" id="header-name-pc"></span>
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </div>
</header>

<div class="course-header">
  <h2 id="course-title">講座詳細</h2>
  <p id="course-subtitle">受講番号：読み込み中...</p>
</div>

<div class="page-wrap">

  <!-- お知らせ -->
  <div class="notice-section">
    <div class="section-title">📢 お知らせ・連絡</div>
    <div class="notice-card" id="notice-list">
      <div class="notice-item">
        <div class="notice-dot" style="background:var(--border);"></div>
        <div><div class="notice-title" style="color:var(--text-light);">読み込み中...</div></div>
      </div>
    </div>
  </div>

  <!-- 受講内容・添削 -->
  <!-- 講座の流れ -->
  <div class="doc-section" id="course-flow-section">
    <div class="section-title">📌 講座の流れ</div>
    <div class="card" id="course-flow-card">
      <div style="color:var(--text-light); font-size:13px;">読み込み中...</div>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-title">
        <div class="card-icon icon-teal">📋</div>
        受講内容・ステータス
      </div>
      <div id="app-detail">
        <div class="app-row"><span class="app-label">講座名</span><span class="app-value" id="app-course">—</span></div>
        <div class="app-row"><span class="app-label">申込日</span><span class="app-value" id="app-applied">—</span></div>
        <div class="app-row"><span class="app-label">修了日</span><span class="app-value" id="app-completed">—</span></div>
        <div class="app-row"><span class="app-label">受講料</span><span class="app-value" id="app-fee">—</span></div>
        <div class="app-row"><span class="app-label">支払方法</span><span class="app-value" id="app-payment">—</span></div>
        <div class="app-row"><span class="app-label">テキスト</span><span class="app-value" id="app-textbook">—</span></div>
        <div class="app-row">
          <span class="app-label">ステータス</span>
          <span class="status-badge status-未対応" id="app-status">—</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <div class="card-icon icon-orange">📝</div>
        添削課題の進捗
      </div>
      <div id="task-list">
        <div class="task-item"><span style="color:var(--text-light); font-size:13px;">読み込み中...</span></div>
      </div>
    </div>
  </div>

  <!-- 動画教材 -->
  <div class="video-section">
    <div class="section-title">🎬 動画教材</div>
    <div class="card">
      <div id="video-list">
        <div style="color:var(--text-light); font-size:13px;">読み込み中...</div>
      </div>
    </div>
  </div>

  <!-- 書類の発行 -->
  <div class="doc-section">
    <div class="section-title">📄 書類の発行</div>
    <div class="card">
      <p style="font-size:13px; color:var(--text-mid); margin-bottom:16px;">見積書・請求書・領収書を発行できます。宛名は変更可能です。</p>
      <div style="margin-bottom:14px;">
        <label style="font-size:12px; color:var(--text-mid); display:block; margin-bottom:5px;">宛名（デフォルト：お名前）</label>
        <input type="text" id="doc-name" placeholder="例）山田太郎　または　○○株式会社"
          style="width:100%; padding:9px 12px; border:1.5px solid var(--border); border-radius:8px; font-family:'Noto Sans JP',sans-serif; font-size:13px; outline:none;">
      </div>
      <div class="doc-grid">
        <button class="doc-btn" onclick="generateDoc('見積書')">
          <span class="doc-icon">📋</span>
          <span class="doc-label">見積書</span>
          <span class="doc-sub">PDF発行</span>
        </button>
        <button class="doc-btn" onclick="generateDoc('請求書')">
          <span class="doc-icon">📑</span>
          <span class="doc-label">請求書</span>
          <span class="doc-sub">PDF発行</span>
        </button>
        <button class="doc-btn" onclick="generateDoc('領収書')">
          <span class="doc-icon">🧾</span>
          <span class="doc-label">領収書</span>
          <span class="doc-sub">PDF発行</span>
        </button>
      </div>
    </div>
  </div>

</div>

<!-- 課題モーダル -->
<!-- 書類アップロードモーダル -->
<div class="modal-overlay" id="upload-modal" style="display:none;" onclick="if(event.target===this)closeUpload()">
  <div class="modal">
    <div class="modal-title" id="upload-modal-title">書類のアップロード</div>
    <div style="font-size:13px;color:var(--text-mid);margin-bottom:12px;" id="upload-modal-desc"></div>
    <div id="upload-modal-notes" style="display:none;background:#f8f9fa;border-radius:8px;padding:12px;margin-bottom:16px;font-size:12px;color:var(--text-mid);line-height:1.8;"></div>

    <!-- 本人確認書類の種類選択 -->
    <div id="id-type-section" style="display:none;margin-bottom:16px;">
      <label style="font-size:12px;color:var(--text-mid);display:block;margin-bottom:6px;">書類の種類を選択してください</label>
      <select id="id-doc-type" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Noto Sans JP',sans-serif;">
        <option value="">選択してください</option>
        <option value="運転免許証">運転免許証（表裏）</option>
        <option value="パスポート">パスポート（顔写真ページ）</option>
        <option value="在留カード">在留カード（表裏）</option>
        <option value="マイナンバーカード">マイナンバーカード（表面のみ）</option>
        <option value="学生証">学生証</option>
        <option value="住民票">住民票（発行から3ヶ月以内）</option>
      </select>
    </div>

    <!-- 表面アップロード -->
    <div style="margin-bottom:12px;">
      <div style="font-size:12px;font-weight:700;color:var(--text-dark);margin-bottom:8px;" id="front-label">📄 表面</div>
      <div style="display:flex;gap:8px;margin-bottom:8px;">
        <button onclick="triggerFileInput('upload-input-front')" style="flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-size:13px;cursor:pointer;">📁 ファイルを選択</button>
        <button onclick="triggerCamera('front')" style="flex:1;padding:10px;border:1.5px solid var(--teal);border-radius:8px;background:#fff;font-size:13px;cursor:pointer;color:var(--teal);">📷 カメラで撮影</button>
      </div>
      <input type="file" id="upload-input-front" accept="image/*,application/pdf" style="display:none;" onchange="previewFile(event,'front')">
      <input type="file" id="upload-input-front-camera" accept="image/*" capture="environment" style="display:none;" onchange="previewFile(event,'front')">
      <div id="upload-preview-front" style="display:none;text-align:center;">
        <img id="preview-img-front" style="max-width:100%;max-height:180px;object-fit:contain;border-radius:8px;margin-bottom:4px;background:#f5f5f5;">
        <div id="preview-name-front" style="font-size:12px;color:var(--text-mid);"></div>
      </div>
    </div>

    <!-- 裏面アップロード（必要な書類のみ表示） -->
    <div id="back-section" style="display:none;margin-bottom:12px;">
      <div style="font-size:12px;font-weight:700;color:var(--text-dark);margin-bottom:8px;">📄 裏面</div>
      <div style="display:flex;gap:8px;margin-bottom:8px;">
        <button onclick="triggerFileInput('upload-input-back')" style="flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-size:13px;cursor:pointer;">📁 ファイルを選択</button>
        <button onclick="triggerCamera('back')" style="flex:1;padding:10px;border:1.5px solid var(--teal);border-radius:8px;background:#fff;font-size:13px;cursor:pointer;color:var(--teal);">📷 カメラで撮影</button>
      </div>
      <input type="file" id="upload-input-back" accept="image/*,application/pdf" style="display:none;" onchange="previewFile(event,'back')">
      <input type="file" id="upload-input-back-camera" accept="image/*" capture="environment" style="display:none;" onchange="previewFile(event,'back')">
      <div id="upload-preview-back" style="display:none;text-align:center;">
        <img id="preview-img-back" style="max-width:100%;max-height:180px;object-fit:contain;border-radius:8px;margin-bottom:4px;background:#f5f5f5;">
        <div id="preview-name-back" style="font-size:12px;color:var(--text-mid);"></div>
      </div>
    </div>

    <!-- カメラプレビュー -->
    <div id="camera-section" style="display:none;margin-bottom:12px;">
      <div style="font-size:12px;font-weight:700;color:var(--text-dark);margin-bottom:8px;" id="camera-label">📷 カメラ撮影</div>
      <video id="camera-preview" autoplay playsinline style="width:100%;border-radius:8px;background:#000;max-height:250px;"></video>
      <canvas id="camera-canvas" style="display:none;"></canvas>
      <div style="display:flex;gap:8px;margin-top:8px;">

        <button onclick="closeCamera()" style="flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-size:13px;cursor:pointer;">撮影をやめる</button>

    <div id="upload-progress" style="display:none;font-size:13px;color:var(--teal);text-align:center;margin-bottom:12px;">アップロード中...</div>

    <div style="display:flex;gap:10px;">
      <button onclick="closeUpload()" style="flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-size:13px;cursor:pointer;">提出をキャンセル</button>
      <button onclick="submitUpload()" id="upload-submit-btn" style="flex:2;padding:10px;background:var(--teal);color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:bold;">提出する</button>
    </div>
  </div>
</div>

  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, getDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js';

  const cfg = {
apiKey: "AIzaSyB-j3hMFs9xWOsFVphKut0bTSQskG6FrW4",
    authDomain: "holiscare-academy.firebaseapp.com",
    projectId: "holiscare-academy",
    storageBucket: "holiscare-academy.firebasestorage.app",
    messagingSenderId: "698886904450",
    appId: "1:698886904450:web:04b9202840ffd321da329b",
  };
  const app = initializeApp(cfg);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.__auth = auth;
  window.__signOut = signOut;

  // URLパラメータからdocId取得
  const docId = new URLSearchParams(location.search).get('id');
  if (!docId) window.location.href = 'mypage.html';

  const statusLabel = {
    pending: '入金待ち', awaiting_payment: '入金待ち',
    pending: '入金待ち', confirmed: '受講確定', active: '受講中', completed: '修了',
    task_done: '添削課題完了', ojt_done: 'OJT完了',
    completed: '修了', cancelled: 'キャンセル',
  };

  const tasks = [
    { num: 1, name: '介護における尊厳の保持・自立支援', count: '26問' },
    { num: 2, name: '介護・福祉サービスの理解と医療との連携', count: '27問' },
    { num: 3, name: '介護におけるコミュニケーション技術', count: '25問' },
    { num: 4, name: 'こころとからだのしくみと生活支援技術（1）', count: '25問' },
    { num: 5, name: 'こころとからだのしくみと生活支援技術（2）', count: '26問' },
  ];

  const videos = [
    { title: '第1章：介護の基本理念と尊厳の保持', duration: '約45分' },
    { title: '第2章：介護保険制度と福祉サービス', duration: '約50分' },
    { title: '第3章：コミュニケーション技術', duration: '約40分' },
  ];

  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = 'mypage_login.html'; return; }

    const name = user.displayName || user.email;
    document.getElementById('header-name').textContent = name + ' さん';
    document.getElementById('doc-name').value = name;
    document.getElementById('doc-name').placeholder = name;

    // 申し込みデータ取得
    try {
      const snap = await getDoc(doc(db, 'applications', docId));
      if (!snap.exists()) { window.location.href = 'mypage.html'; return; }

const data = snap.data();
      const status = data.status || 'pending';
      renderCourseFlow(data);
      const statusText = statusLabel[status] || status;

      document.getElementById('course-title').textContent = data.course || 'オンライン初任者研修';
      document.getElementById('course-subtitle').textContent = '受講番号：' + (data.studentNo || '—');
      document.getElementById('app-course').textContent = data.course || 'オンライン初任者研修';
        document.getElementById('app-applied').textContent = data.createdAt ? new Date(data.createdAt.toMillis()).toLocaleDateString('ja-JP') : '—';
        document.getElementById('app-completed').textContent = data.completedAt ? new Date(data.completedAt.toMillis()).toLocaleDateString('ja-JP') : '—';
      document.getElementById('app-fee').textContent = data.fee || '33,000円（税込）';
      document.getElementById('app-payment').textContent = data.payment || '—';
      document.getElementById('app-textbook').textContent =
        (data.textbook === 'purchase' || data.textbook === '購入（6,600円）') ? '購入（6,600円）' : (data.textbook || '—');
      const statusEl = document.getElementById('app-status');
      statusEl.textContent = statusText;
      statusEl.className = 'status-badge status-' + statusText;

      // ステータスによる表示制御
      const isConfirmed = ['confirmed','active','completed'].includes(status);
      const isVideoDone = ['active','completed'].includes(status);
      const isTaskDone = ['active','completed'].includes(status);
      const isActive = ['active','completed'].includes(status);
      const canReceipt = isConfirmed;

      // 添削課題・動画教材のロック表示
      if (!isActive) {
        document.querySelector('.grid-2').insertAdjacentHTML('afterend', `
          <div style="background:#fff8e1; border:1px solid #ffe082; border-radius:12px; padding:20px; text-align:center; margin-bottom:28px;">
            <div style="font-size:24px; margin-bottom:8px;">🔒</div>
            <div style="font-weight:700; color:#B8860B; margin-bottom:4px;">${isConfirmed ? '受講準備完了後に利用できます' : '受講確定後に利用できます'}</div>
            <div style="font-size:13px; color:#888;">動画教材・添削課題は受講開始後にご利用いただけます</div>
          </div>
        `);
        document.querySelector('.video-section').style.display = 'none';
        document.getElementById('task-list').closest('.card').style.opacity = '0.4';
        document.getElementById('task-list').closest('.card').style.pointerEvents = 'none';
      }

      // 領収書の制御
      if (!canReceipt) {
        document.querySelectorAll('.doc-btn').forEach(btn => {
          if (btn.getAttribute('onclick')?.includes('領収書')) {
            btn.style.opacity = '0.4';
            btn.style.pointerEvents = 'none';
            btn.querySelector('.doc-sub').textContent = '受講確定後';
          }
        });
      }

      // 添削課題
      const taskList = document.getElementById('task-list');
      taskList.innerHTML = tasks.map(t => `
        <div class="task-item">
          <div class="task-num">${t.num}</div>
          <div style="flex:1;">
            <div class="task-name">${t.name}</div>
            <div class="task-count">${t.count}</div>
          </div>
          <span class="task-status ${isTaskDone ? 'task-合格' : 'task-未提出'}">${isTaskDone ? '完了' : '未提出'}</span>
          ${isTaskDone ? '<span style="color:var(--green); font-size:12px;">✅</span>' : `<button class="task-btn" onclick="openTask(${t.num})">回答する</button>`}
        </div>
      `).join('');

      // 動画教材
      const videoList = document.getElementById('video-list');
      videoList.innerHTML = videos.map(v => `
        <div class="video-item">
          <div class="video-thumb">▶</div>
          <div style="flex:1;">
            <div class="video-title">${v.title}</div>
            <div class="video-duration">${v.duration}</div>
          </div>
          ${isVideoDone ? '<span style="color:var(--green); font-weight:700; font-size:13px;">✅ 視聴済み</span>' : '<button class="video-btn" onclick="alert(\'動画URLは管理者が設定します\')">視聴する</button>'}
        </div>
      `).join('');

    } catch(e) {
      console.error(e);
    }

// お知らせをFirestoreから取得
    const noticeList = document.getElementById('notice-list');
    const uid = user.uid;
    const email = user.email;
    try {
      const { collection, query, orderBy, getDocs, getFirestore } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      const db = getFirestore();
      const q = query(collection(db, 'notices'), orderBy('createdAt', 'desc'));
      const snap = await getDocs(q);
      const notices = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(n => {
          if (n.target === 'all') return true;
          if (n.target === 'specific' && n.emails && n.emails.includes(email)) return true;
          if (n.target === 'selected' && n.targetUids && n.targetUids.includes(uid)) return true;
          return false;
        });

      if (notices.length === 0) {
        noticeList.innerHTML = '<div style="padding:20px;text-align:center;color:#aaa;font-size:13px;">お知らせはありません</div>';
      } else {
        const PER_PAGE = 5;
        let currentPage = 1;
        const totalPages = Math.ceil(notices.length / PER_PAGE);

        function renderNotices() {
          const start = (currentPage - 1) * PER_PAGE;
          const pageItems = notices.slice(start, start + PER_PAGE);
          const readIds = JSON.parse(localStorage.getItem('readNotices') || '[]');
          noticeList.innerHTML = pageItems.map(n => {
            const isRead = readIds.includes(n.id);
            const dt = n.createdAt?.toDate?.() ? n.createdAt.toDate().toLocaleDateString('ja-JP') : '';
            return `
              <div class="notice-item ${isRead ? '' : 'unread'}" onclick="markRead('${n.id}', this)" style="cursor:pointer;">
                <div class="notice-dot" ${isRead ? 'style="background:var(--border);"' : ''}></div>
                <div>
                  <div class="notice-date">${dt}</div>
                  <div class="notice-title">${n.title}</div>
                  <div class="notice-preview">${n.body}</div>
                  ${n.fileUrl ? `<a href="${n.fileUrl}" target="_blank" style="font-size:12px;color:var(--teal-dark);">📎 ${n.fileName}</a>` : ''}
                </div>
              </div>`;
          }).join('');
          if (totalPages > 1) {
            let pg = '<div style="display:flex;justify-content:center;align-items:center;gap:8px;padding:12px 0;">';
            pg += `<button onclick="changePageS(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} style="padding:4px 12px;border:1px solid #ddd;border-radius:4px;background:${currentPage === 1 ? '#f5f5f5' : '#fff'};cursor:${currentPage === 1 ? 'default' : 'pointer'};color:#555;">‹ 前へ</button>`;
            for (let i = 1; i <= totalPages; i++) {
              pg += `<button onclick="changePageS(${i})" style="padding:4px 10px;border:1px solid ${i === currentPage ? 'var(--teal)' : '#ddd'};border-radius:4px;background:${i === currentPage ? 'var(--teal)' : '#fff'};color:${i === currentPage ? '#fff' : '#555'};cursor:pointer;">${i}</button>`;
            }
            pg += `<button onclick="changePageS(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} style="padding:4px 12px;border:1px solid #ddd;border-radius:4px;background:${currentPage === totalPages ? '#f5f5f5' : '#fff'};cursor:${currentPage === totalPages ? 'default' : 'pointer'};color:#555;">次へ ›</button>`;
            pg += '</div>';
            noticeList.innerHTML += pg;
          }
        }
        window.changePageS = function(page) {
          if (page < 1 || page > totalPages) return;
          currentPage = page;
          renderNotices();
        };
        renderNotices();
      }
    } catch(e) {
      noticeList.innerHTML = '<div style="padding:20px;text-align:center;color:#aaa;font-size:13px;">お知らせの取得に失敗しました</div>';
    }
  });

  window.__appData = {};

  // アップロード機能
  let currentUploadType = '';

  window.openUpload = function(type) {
    currentUploadType = type;
    const modal = document.getElementById('upload-modal');
    const title = document.getElementById('upload-modal-title');
    const desc = document.getElementById('upload-modal-desc');
    const idSection = document.getElementById('id-type-section');
    // リセット
    ['front','back'].forEach(side => {
      document.getElementById(`upload-input-${side}`).value = '';
      document.getElementById(`upload-input-${side}-camera`).value = '';
      document.getElementById(`upload-preview-${side}`).style.display = 'none';
    });
    document.getElementById('upload-progress').style.display = 'none';
    document.getElementById('back-section').style.display = 'none';
    const notes = document.getElementById('upload-modal-notes');
    if (type === 'photo') {
      title.textContent = '顔写真のアップロード';
      desc.textContent = '正面を向いた顔写真をアップロードしてください。';
      document.getElementById('front-label').textContent = '📷 顔写真';
      idSection.style.display = 'none';
      notes.style.display = 'block';
      notes.innerHTML = '・正面を向き、顔全体が写るように撮影してください<br>・帽子・サングラスは外してください<br>・背景はできるだけ無地にしてください<br>・明るい場所で撮影してください';
    } else {
      title.textContent = '本人確認書類のアップロード';
      desc.innerHTML = '以下のいずれかをアップロードしてください。';
      document.getElementById('front-label').textContent = '📄 表面';
      idSection.style.display = 'block';
      document.getElementById('id-doc-type').value = '';
      notes.style.display = 'block';
      notes.innerHTML = '・書類全体が枠内に収まるように撮影してください<br>・文字がはっきり読めるように撮影してください<br>・光の反射や影がないようにしてください<br>・運転免許証・在留カードは表裏両面が必要です<br>・マイナンバーカードは表面のみ提出してください<br>・住民票は発行から3ヶ月以内のものに限ります';
    }
    modal.style.display = 'flex';
  };

  window.closeUpload = function() {
    closeCamera();
    document.getElementById('upload-modal').style.display = 'none';
  };

  window.triggerFileInput = function(id) {
    document.getElementById(id).click();
  };

  let currentCameraSide = 'front';
  let cameraStream = null;

  window.triggerCamera = async function(side) {
    currentCameraSide = side;
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    if (isMobile) {
      // スマホはネイティブカメラを使用
      const inputId = `upload-input-${side}-camera`;
      document.getElementById(inputId).click();
      return;
    }
    const label = currentUploadType === 'photo' ? '📷 カメラ撮影' : side === 'front' ? '📷 カメラ撮影（表面）' : '📷 カメラ撮影（裏面）';
    document.getElementById('camera-label').textContent = label;
    document.getElementById('camera-section').style.display = 'block';
    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
      document.getElementById('camera-preview').srcObject = cameraStream;
    } catch(e) {
      // PCでリアカメラがない場合はフロントカメラで試みる
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        document.getElementById('camera-preview').srcObject = cameraStream;
      } catch(e2) {
        alert('カメラにアクセスできませんでした。ファイル選択をお使いください。');
        document.getElementById('camera-section').style.display = 'none';
      }
    }
  };

  window.closeCamera = function() {
    if (cameraStream) {
      cameraStream.getTracks().forEach(t => t.stop());
      cameraStream = null;
    }
    document.getElementById('camera-section').style.display = 'none';
  };

  window.capturePhoto = function() {
    const video = document.getElementById('camera-preview');
    const canvas = document.getElementById('camera-canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    canvas.toBlob(blob => {
      const file = new File([blob], `camera_${Date.now()}.jpg`, { type: 'image/jpeg' });
      const preview = document.getElementById(`upload-preview-${currentCameraSide}`);
      const img = document.getElementById(`preview-img-${currentCameraSide}`);
      const name = document.getElementById(`preview-name-${currentCameraSide}`);
      const reader = new FileReader();
      reader.onload = e => { img.src = e.target.result; };
      reader.readAsDataURL(file);
      preview.style.display = 'block';
      name.textContent = file.name;
      // DataTransferを使ってinputにセット
      const dt = new DataTransfer();
      dt.items.add(file);
      document.getElementById(`upload-input-${currentCameraSide}-camera`).files = dt.files;
      closeCamera();
    }, 'image/jpeg', 0.9);
  };

  // 書類種類変更時に裏面表示を切り替え
  document.getElementById('id-doc-type').addEventListener('change', function() {
    const needsBack = ['運転免許証','在留カード'].includes(this.value);
    document.getElementById('back-section').style.display = needsBack ? 'block' : 'none';
  });

  window.previewFile = function(event, side) {
    const file = event.target.files[0];
    if (!file) return;
    const preview = document.getElementById(`upload-preview-${side}`);
    const img = document.getElementById(`preview-img-${side}`);
    const name = document.getElementById(`preview-name-${side}`);
    preview.style.display = 'block';
    name.textContent = file.name;
    if (file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = e => { img.src = e.target.result; };
      reader.readAsDataURL(file);
    }
  };

  window.submitUpload = async function() {
    const frontInput = document.getElementById('upload-input-front').files[0] || document.getElementById('upload-input-front-camera').files[0];
    if (!frontInput) { alert('ファイルを選択してください'); return; }

    if (currentUploadType === 'id') {
      const idType = document.getElementById('id-doc-type').value;
      if (!idType) { alert('書類の種類を選択してください'); return; }
      const needsBack = ['運転免許証','在留カード'].includes(idType);
      if (needsBack) {
        const backInput = document.getElementById('upload-input-back').files[0] || document.getElementById('upload-input-back-camera').files[0];
        if (!backInput) { alert('裏面もアップロードしてください'); return; }
      }
    }

    const btn = document.getElementById('upload-submit-btn');
    const progress = document.getElementById('upload-progress');
    btn.disabled = true;
    progress.style.display = 'block';

    try {
      const { getStorage, ref, uploadBytes, getDownloadURL } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js');
      const { getFirestore, doc, updateDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      const storage = getStorage();
      const user = auth.currentUser;
      const ts = Date.now();

      // 表面アップロード
      const frontExt = frontInput.name.split('.').pop();
      const frontRef = ref(storage, `documents/${user.uid}/${currentUploadType}_front_${ts}.${frontExt}`);
      await uploadBytes(frontRef, frontInput);
      const frontUrl = await getDownloadURL(frontRef);

      const db = getFirestore();
      const updateData = {};

      if (currentUploadType === 'photo') {
        updateData['documentStatus.photo'] = 'pending';
        updateData['documentStatus.photoUrl'] = frontUrl;
      } else {
        const idType = document.getElementById('id-doc-type').value;
        updateData['documentStatus.idDocument'] = 'pending';
        updateData['documentStatus.idDocumentUrl'] = frontUrl;
        updateData['documentStatus.idDocumentType'] = idType;

        // 裏面アップロード（必要な場合）
        const needsBack = ['運転免許証','在留カード'].includes(idType);
        if (needsBack) {
          const backInput = document.getElementById('upload-input-back').files[0] || document.getElementById('upload-input-back-camera').files[0];
          const backExt = backInput.name.split('.').pop();
          const backRef = ref(storage, `documents/${user.uid}/${currentUploadType}_back_${ts}.${backExt}`);
          await uploadBytes(backRef, backInput);
          const backUrl = await getDownloadURL(backRef);
          updateData['documentStatus.idDocumentBackUrl'] = backUrl;
        }
      }

      await updateDoc(doc(db, 'applications', docId), updateData);
      progress.style.display = 'none';
      closeUpload();
      alert('提出しました！確認後に承認されます。');
      location.reload();
    } catch(e) {
      progress.style.display = 'none';
      btn.disabled = false;
      alert('アップロードに失敗しました：' + e.message);
    }
  };

// 講座の流れチェックリスト
  function renderCourseFlow(data) {
    const el = document.getElementById('course-flow-card');
    if (!el) return;
    const status = data.status || '';
    const docStatus = data.documentStatus || {};
    const photoOk = docStatus.photo === 'approved';
    const photoPending = docStatus.photo === 'pending';
    const photoRejected = docStatus.photo === 'rejected';
    const idOk = docStatus.idDocument === 'approved';
    const idPending = docStatus.idDocument === 'pending';
    const idRejected = docStatus.idDocument === 'rejected';
    const photoRejectReason = docStatus.photoRejectReason || '';
    const idRejectReason = docStatus.idDocumentRejectReason || '';
    const pledgeOk = data.pledgeSigned === true;
    const isConfirmed = ['confirmed', 'active', 'completed'].includes(status);
    const isActive = ['active', 'completed'].includes(status);
    const test1Ok = data.test1Passed === true;
    const test2Ok = data.test2Passed === true;
    const ojtOk = data.ojtPassed === true;

    function item(icon, label, done, active, locked) {
      const cls = done ? 'done' : (locked ? 'locked' : 'active');
      const ic = done ? '✅' : (locked ? '🔒' : '🔄');
      return `<div class="flow-item ${cls}"><span class="flow-icon">${ic}</span>${label}</div>`;
    }

    let html = '';

    // STEP0
    html += `<div class="flow-step">`;
    html += `<div class="flow-step-title">🟦 STEP 0｜受講確定</div>`;
    html += item('', '受講料のお支払い', isConfirmed, !isConfirmed, false);
    html += `</div><hr class="flow-divider">`;

    // STEP1
    html += `<div class="flow-step">`;
    html += `<div class="flow-step-title">🟨 STEP 1｜受講準備 ${!isConfirmed ? '<span style="font-size:11px;color:var(--text-light);">（受講確定後に解放）</span>' : ''}</div>`;
    const photoBtn = isConfirmed && !photoOk && !photoPending && !photoRejected ? `<button onclick="openUpload('photo')" style="margin-left:auto;padding:4px 12px;background:var(--teal);color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;">提出する</button>` : '';
    const idBtn = isConfirmed && !idOk && !idPending && !idRejected ? `<button onclick="openUpload('id')" style="margin-left:auto;padding:4px 12px;background:var(--teal);color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;">提出する</button>` : '';
    const photoPendingBadge = photoPending ? `<span style="margin-left:auto;font-size:11px;background:#FFF8E1;color:#F57C00;padding:3px 8px;border-radius:10px;">提出済み・確認中</span>` : '';
    const idPendingBadge = idPending ? `<span style="margin-left:auto;font-size:11px;background:#FFF8E1;color:#F57C00;padding:3px 8px;border-radius:10px;">提出済み・確認中</span>` : '';
    const photoRejectedBadge = photoRejected ? `<span style="margin-left:auto;font-size:11px;background:#FFF3F3;color:#c0392b;padding:3px 8px;border-radius:10px;">要再提出</span><button onclick="openUpload('photo')" style="margin-left:8px;padding:4px 12px;background:var(--teal);color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;">再提出する</button>${photoRejectReason ? '<div style="width:100%;font-size:11px;color:#c0392b;margin-top:4px;">理由：' + photoRejectReason + '</div>' : ''}` : '';
    const idRejectedBadge = idRejected ? `<span style="margin-left:auto;font-size:11px;background:#FFF3F3;color:#c0392b;padding:3px 8px;border-radius:10px;">要再提出</span><button onclick="openUpload('id')" style="margin-left:8px;padding:4px 12px;background:var(--teal);color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;">再提出する</button>${idRejectReason ? '<div style="width:100%;font-size:11px;color:#c0392b;margin-top:4px;">理由：' + idRejectReason + '</div>' : ''}` : '';
    html += `<div class="flow-item ${photoOk ? 'done' : photoRejected ? 'rejected' : (isConfirmed ? 'active' : 'locked')}" style="flex-wrap:wrap;"><span class="flow-icon">${photoOk ? '✅' : photoRejected ? '⚠️' : (isConfirmed ? '🔄' : '🔒')}</span>顔写真の提出${photoBtn}${photoPendingBadge}${photoRejectedBadge}</div>`;
    html += `<div class="flow-item ${idOk ? 'done' : idRejected ? 'rejected' : (isConfirmed ? 'active' : 'locked')}" style="flex-wrap:wrap;"><span class="flow-icon">${idOk ? '✅' : idRejected ? '⚠️' : (isConfirmed ? '🔄' : '🔒')}</span>本人確認書類の提出${idBtn}${idPendingBadge}${idRejectedBadge}</div>`;
    html += `<div class="flow-item ${pledgeOk ? 'done' : (isConfirmed ? 'active' : 'locked')}"><span class="flow-icon">${pledgeOk ? '✅' : (isConfirmed ? '🔄' : '🔒')}</span>誓約書への同意${isConfirmed && !pledgeOk ? '<a href="gakusoku.html?id=' + docId + '" style="margin-left:auto;padding:4px 12px;background:var(--teal);color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;text-decoration:none;">確認・同意する</a>' : ''}</div>`;
    html += `</div><hr class="flow-divider">`;

    // STEP2
    const step1Done = photoOk && idOk && pledgeOk;
    html += `<div class="flow-step">`;
    html += `<div class="flow-step-title">🟩 STEP 2｜受講中 ${!step1Done ? '<span style="font-size:11px;color:var(--text-light);">（受講準備完了後に解放）</span>' : ''}</div>`;
    html += item('', '添削課題の提出', data.taskAllDone === true, step1Done && !data.taskAllDone, !step1Done);
    html += item('', '動画視聴（自社）', data.videoAllDone === true, step1Done && !data.videoAllDone, !step1Done);
    html += item('', '動画視聴（外部）', data.externalVideoDone === true, step1Done && !data.externalVideoDone, !step1Done);
    html += `</div><hr class="flow-divider">`;

    // STEP3
    const step2Done = data.taskAllDone && data.videoAllDone && data.externalVideoDone;
    html += `<div class="flow-step">`;
    html += `<div class="flow-step-title">🟧 STEP 3｜テスト ${!step2Done ? '<span style="font-size:11px;color:var(--text-light);">（受講完了後に解放）</span>' : ''}</div>`;
    html += item('', 'テスト１', test1Ok, step2Done && !test1Ok, !step2Done);
    html += item('', 'テスト２（条件付き修了証発行）', test2Ok, step2Done && test1Ok && !test2Ok, !step2Done || !test1Ok);
    html += `</div><hr class="flow-divider">`;

    // STEP4
    html += `<div class="flow-step">`;
    html += `<div class="flow-step-title">🟥 STEP 4｜修了 ${!test2Ok ? '<span style="font-size:11px;color:var(--text-light);">（テスト２合格後に解放）</span>' : ''}</div>`;
    html += item('', 'OJT完了（本修了証発行・郵送）', ojtOk, test2Ok && !ojtOk, !test2Ok);
    html += `</div>`;

    el.innerHTML = html;
  }
</script>

<script>
  async function doLogout() {
    await window.__signOut(window.__auth);
    window.location.href = 'mypage_login.html';
  }
  window.doLogout = doLogout;

  function openTask(num) {
    document.getElementById('modal-title').textContent = '添削課題 ' + num;
    document.getElementById('modal-content').innerHTML = '<p style="color:var(--text-mid); font-size:13px;">課題システムは準備中です。</p>';
    document.getElementById('task-modal').classList.add('open');
  }
  window.openTask = openTask;

  function closeTask() {
    document.getElementById('task-modal').classList.remove('open');
  }
  window.closeTask = closeTask;

  window.markRead = function(id, el) {
    const readIds = JSON.parse(localStorage.getItem('readNotices') || '[]');
    if (!readIds.includes(id)) {
      readIds.push(id);
      localStorage.setItem('readNotices', JSON.stringify(readIds));
    }
    el.classList.remove('unread');
    el.querySelector('.notice-dot').style.background = 'var(--border)';
  };

  function generateDoc(type) {
    const name = document.getElementById('doc-name').value || 'お客様';
    alert(`${type}の発行機能は準備中です。\n宛名：${name}`);
  }
  window.generateDoc = generateDoc;
</script>

</body>
</html>
