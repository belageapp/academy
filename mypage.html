<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ | ホリスケアアカデミー</title>
  <link rel="icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal: #2BBCD4;
      --teal-dark: #1A9AB0;
      --teal-light: #E0F7FB;
      --teal-pale: #F0FBFD;
      --pink: #F2708A;
      --pink-light: #FEF0F3;
      --yellow: #FFD84D;
      --yellow-light: #FFFBEB;
      --green: #4CAF72;
      --green-light: #EBF7EF;
      --orange: #E8823A;
      --orange-light: #FEF3E8;
      --white: #FFFFFF;
      --bg: #F2F8FA;
      --text: #1A3A40;
      --text-mid: #4A7A85;
      --text-light: #8AB8C0;
      --border: #C8EAF0;
      --red: #E05050;
      --shadow: rgba(43,188,212,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ヘッダー */
    .header {
      background: white; border-bottom: 3px solid var(--teal);
      padding: 0 24px; height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 10px var(--shadow);
    }
    .header-logo { display: flex; align-items: center; }
    .header-logo img { height: 36px; width: auto; }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .header-name { font-size: 13px; color: var(--text-mid); }
    .logout-btn {
      background: none; border: 1.5px solid var(--border);
      color: var(--text-mid); border-radius: 20px;
      padding: 6px 14px; font-size: 12px; cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      transition: all 0.2s;
    }
    .logout-btn:hover { background: var(--teal-light); border-color: var(--teal); }

    /* ウェルカム */
    .welcome-bar {
      background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
      padding: 24px 24px 20px; color: white;
    }
    .welcome-bar h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .welcome-bar p { font-size: 13px; opacity: 0.85; }

    /* メインコンテンツ */
    .page-wrap { max-width: 680px; margin: 0 auto; padding: 24px 16px 60px; }

    /* セクションタイトル */
    .section-title {
      font-size: 15px; font-weight: 700; color: var(--text);
      margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    }
    .section-title::before {
      content: ''; display: block; width: 4px; height: 18px;
      background: var(--teal); border-radius: 2px;
    }
    .badge-count {
      background: var(--pink); color: white;
      font-size: 11px; font-weight: 700; border-radius: 10px;
      padding: 1px 7px; margin-left: 4px;
    }

    /* お知らせ */
    .notice-section { margin-bottom: 28px; }
    .notice-card {
      background: white; border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px var(--shadow);
      overflow: hidden;
    }
    .notice-item {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.15s;
    }
    .notice-item:last-child { border-bottom: none; }
    .notice-item:hover { background: var(--teal-pale); }
    .notice-item.unread { background: #FFFBF0; }
    /* アコーディオン */
    .notice-accordion { border-bottom: 1px solid var(--border); }
    .notice-accordion:last-child { border-bottom: none; }
    .notice-accordion-header {
      width: 100%; background: none; border: none; padding: 12px 14px;
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; font-family: inherit; text-align: left;
      transition: background 0.15s; position: relative; overflow: hidden;
    }
    .notice-accordion-header:hover { background: var(--teal-pale); }
    .notice-unread-bar {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: transparent; border-radius: 2px;
    }
    .notice-accordion.unread .notice-unread-bar { background: #F59E0B; }
    .notice-accordion.unread .notice-acc-title { font-weight: 700; }
    .notice-acc-date { font-size: 11px; color: var(--text-light); white-space: nowrap; flex-shrink: 0; }
    .notice-acc-title { font-size: 13px; color: var(--text); flex: 1; font-weight: 500; }
    .notice-acc-arrow { font-size: 10px; color: var(--text-light); flex-shrink: 0; transition: transform 0.2s; display: inline-block; }
    .notice-acc-arrow.open { transform: rotate(180deg); }
    .notice-accordion-body { display: none; padding: 0 14px 14px 14px; font-size: 13px; color: var(--text-mid); line-height: 1.7; }
    .notice-accordion-body.open { display: block; }
    .notice-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--yellow); flex-shrink: 0; margin-top: 5px;
    }
    .notice-item:not(.unread) .notice-dot { background: var(--border); }
    .notice-date { font-size: 11px; color: var(--text-light); margin-bottom: 2px; }
    .notice-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
    .notice-preview { font-size: 12px; color: var(--text-mid); line-height: 1.5; }

    /* 講座一覧 */
    .courses-section { margin-bottom: 28px; }
    .course-card {
      background: white; border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px var(--shadow);
      padding: 20px; cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center; gap: 16px;
      margin-bottom: 12px;
      text-decoration: none; color: inherit;
    }
    .course-card:hover {
      border-color: var(--teal); box-shadow: 0 4px 16px var(--shadow);
      transform: translateY(-1px);
    }
    .course-icon {
      width: 52px; height: 52px; border-radius: 12px;
      background: var(--teal-light); display: flex; align-items: center;
      justify-content: center; font-size: 24px; flex-shrink: 0;
    }
    .course-info { flex: 1; }
    .course-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .course-meta { font-size: 12px; color: var(--text-mid); margin-bottom: 6px; }
    .course-arrow { color: var(--teal); font-size: 18px; flex-shrink: 0; }
    .status-badge {
      display: inline-block; font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
    }
    .status-pending { background: var(--yellow-light); color: #B8860B; }
    .status-confirmed { background: var(--teal-light); color: var(--teal-dark); }
    .status-completed { background: var(--green-light); color: #2E7D47; }
    .status-cancelled { background: #F5F5F5; color: #888; }
    .status-未対応 { background: var(--yellow-light); color: #B8860B; }
    .status-入金待ち { background: var(--yellow-light); color: #B8860B; }
    .status-受講確定 { background: var(--teal-light); color: var(--teal-dark); }
    .status-修了 { background: var(--green-light); color: #2E7D47; }
    .status-キャンセル { background: #F5F5F5; color: #888; }

    /* 空の講座 */
    .no-course {
      background: white; border-radius: 12px; border: 1px dashed var(--border);
      padding: 32px; text-align: center; color: var(--text-light); font-size: 14px;
    }

    /* パスワード変更 */
    .pw-section { margin-bottom: 28px; }
    .card {
      background: white; border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px var(--shadow);
      padding: 20px;
    }
    .card-title {
      font-size: 14px; font-weight: 700; color: var(--text);
      margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    }
    .card-icon {
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    .icon-pink { background: var(--pink-light); }
    .pw-form { display: flex; flex-direction: column; gap: 10px; }
    .pw-form input {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px; outline: none; transition: border-color 0.2s;
    }
    .pw-form input:focus { border-color: var(--teal); }
    .pw-submit {
      background: var(--teal); color: white; border: none;
      border-radius: 8px; padding: 11px; font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
      transition: background 0.2s;
    }
    .pw-submit:hover { background: var(--teal-dark); }

    @media (max-width: 600px) {
      .welcome-bar { padding: 20px 16px; }
      .page-wrap { padding: 20px 12px 60px; }
    }
    @media (max-width: 480px) {
      .header { padding: 8px 12px; height: auto; flex-direction: column; align-items: stretch; gap: 6px; }
      .header-logo { justify-content: center; }
      .header-right { justify-content: flex-end; align-items: center; gap: 8px; }
      .header-name { font-size: 12px; }
      .logout-btn { padding: 5px 10px; font-size: 11px; }
    }
/* トグルセクション */
    .toggle-section {
      background: white; border-radius: 12px; border: 1px solid var(--border);
      box-shadow: 0 2px 8px var(--shadow); margin-bottom: 12px; overflow: hidden;
    }
    .toggle-header {
      width: 100%; background: none; border: none; padding: 16px 18px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; font-family: inherit; text-align: left;
      transition: background 0.15s;
    }
    .toggle-header:hover { background: var(--teal-pale); }
    .toggle-header-left { display: flex; align-items: center; gap: 10px; }
    .toggle-icon-wrap {
      width: 32px; height: 32px; border-radius: 8px; background: var(--teal-light);
      display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
    }
    .toggle-header-title { font-size: 14px; font-weight: 700; color: var(--text); display:flex; flex-direction:column; gap:2px; }
    .toggle-header-desc { font-size: 11px; font-weight: 400; color: var(--text-mid); }
    .toggle-arrow {
      font-size: 20px; color: var(--text-light); transition: transform 0.25s;
      display: inline-block; flex-shrink: 0;
    }
    .toggle-arrow.open { transform: rotate(90deg); }
    .toggle-body {
      display: none; padding: 14px 18px 18px;
      border-top: 1px solid var(--border);
    }
    .toggle-body.open { display: block; }
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">
    <img src="assets/logo.png" alt="ホリスケアアカデミー" onerror="this.style.display='none'">
  </div>
  <div class="header-right">
    <span class="header-name" id="header-name"></span>
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </div>
</header>

<div class="welcome-bar">
  <h2 id="welcome-name">こんにちは</h2>
  <p>ホリスケアアカデミー マイページ</p>
</div>

<div class="page-wrap">

  <!-- お知らせ -->
  <div class="toggle-section">
    <button class="toggle-header" onclick="toggleSection('notice-body')">
      <span class="toggle-header-left">
        <span class="toggle-icon-wrap">📢</span>
<span class="toggle-header-title">お知らせ・連絡
          <span class="toggle-header-desc">スクールからの連絡事項</span>
        </span>
        <span id="unread-count" style="display:none;background:#F57C00;color:#fff;border-radius:10px;font-size:11px;padding:2px 8px;font-weight:700;margin-left:6px;vertical-align:middle;"></span>
        </span>
      </span>
      <span class="toggle-arrow open" id="arrow-notice-body">›</span>
    </button>
    <div class="toggle-body open" id="notice-body" style="padding-top:0;">
      <div id="notice-list">
        <div style="padding:14px 16px;color:var(--text-light);font-size:13px;">読み込み中...</div>
      </div>
    </div>
  </div>

<!-- 受講講座一覧 -->
  <div class="toggle-section" style="cursor:default;">
    <div class="toggle-header" style="cursor:default;">
      <span class="toggle-header-left">
        <span class="toggle-icon-wrap">📚</span>
        <span class="toggle-header-title">受講講座一覧</span>
      </span>
    </div>
    <div style="padding:14px 18px 18px;border-top:1px solid var(--border);">
      <div id="course-list">
        <div class="no-course">受講中の講座を読み込んでいます...</div>
      </div>
    </div>
  </div>

  <!-- パスワード変更 -->
  <div class="toggle-section">
    <button class="toggle-header" onclick="toggleSection('pw-body')">
      <span class="toggle-header-left">
        <span class="toggle-icon-wrap" style="background:var(--pink-light);">🔒</span>
        <span class="toggle-header-title">パスワード変更
          <span class="toggle-header-desc">初期パスワードから変更することをお勧めします</span>
        </span>
       </span>
      <span class="toggle-arrow" id="arrow-pw-body">›</span>
    </button>
    <div class="toggle-body" id="pw-body">
      <div class="pw-form">
        <input type="password" id="new-pw" placeholder="新しいパスワード（8文字以上）">
        <input type="password" id="new-pw2" placeholder="新しいパスワード（確認）">
        <button class="pw-submit" onclick="changePassword()">パスワードを変更する</button>
      </div>
      <div id="pw-msg" style="font-size:13px; margin-top:10px; display:none;"></div>
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, onAuthStateChanged, signOut, updatePassword } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
 import { getFirestore, collection, query, where, getDocs, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const cfg = {
apiKey: "AIzaSyB-j3hMFs9xWOsFVphKut0bTSQskG6FrW4",
    authDomain: "holiscare-academy.firebaseapp.com",
    projectId: "holiscare-academy",
    storageBucket: "holiscare-academy.firebasestorage.app",
    messagingSenderId: "698886904450",
    appId: "1:698886904450:web:04b9202840ffd321da329b",
  };
  const app = initializeApp(cfg);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.__auth = auth;
  window.__signOut = signOut;
  window.__updatePassword = updatePassword;

  const statusLabel = {
    pending: '入金待ち',
    awaiting_payment: '入金待ち',
    confirmed: '受講確定',
    active: '受講中',
    video_done: '受講中',
    task_done: '受講中',
    ojt_done: '受講中',
    completed: '修了',
    cancelled: 'キャンセル',
  };

  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = 'mypage_login.html'; return; }

    const name = user.displayName || user.email;
    document.getElementById('header-name').textContent = name + ' さん';
    document.getElementById('welcome-name').textContent = name + ' さん、こんにちは！';

    // 申し込みデータ取得
    try {
const q = query(
        collection(db, 'applications'),
        where('email', '==', user.email)
      );
      const snap = await getDocs(q);

      const courseList = document.getElementById('course-list');

      if (snap.empty) {
        courseList.innerHTML = '<div class="no-course">受講中の講座はありません</div>';
      } else {
        courseList.innerHTML = '';
        // coursesマスタを取得
        const courseMaster = {};
        const courseSnap = await getDocs(collection(db, 'courses'));
        courseSnap.forEach(d => { courseMaster[d.id] = d.data(); });

        const allDocs = snap.docs.sort((a, b) => {
          const ta = a.data().createdAt?.toMillis?.() || 0;
          const tb = b.data().createdAt?.toMillis?.() || 0;
          return tb - ta;
        });
        const showDocs = allDocs.slice(0, 3);
        const hiddenDocs = allDocs.slice(3);

        showDocs.forEach(doc => {
          const data = doc.data();
          const status = data.status || 'pending';
          const statusText = statusLabel[status] || status;
          const card = document.createElement('a');
          card.className = 'course-card';
const courseCode = data.courseCode || '4010';
        const master = courseMaster[courseCode];
        const courseFile = master?.pageFile || 'mypage_course_shonin.html';
        card.href = `${courseFile}?id=${doc.id}`;
          const statusColors = {
            '入金待ち': {bg:'#FFF8E1',border:'#FDE68A',text:'#92400E'},
            '受講確定': {bg:'#E0F7FB',border:'#7ECFD9',text:'#1A9AB0'},
            '受講中':   {bg:'#EBF7EF',border:'#86EFAC',text:'#166534'},
            '修了':     {bg:'#F3E8FF',border:'#C4B5FD',text:'#5B21B6'},
            'キャンセル':{bg:'#F5F5F5',border:'#D1D5DB',text:'#6B7280'},
          };
          const sc = statusColors[statusText] || {bg:'#F3F4F6',border:'#D1D5DB',text:'#6B7280'};
          const startDate = data.activeAt ? new Date(data.activeAt.toMillis()) : null;
          const today = new Date(); today.setHours(0,0,0,0);
          const tempLimit = startDate ? new Date(new Date(startDate).setMonth(startDate.getMonth()+3)) : null;
          const fullLimit = startDate ? new Date(new Date(startDate).setMonth(startDate.getMonth()+8)) : null;
          const tempDays = tempLimit ? Math.ceil((tempLimit-today)/(1000*60*60*24)) : null;
          const fullDays = fullLimit ? Math.ceil((fullLimit-today)/(1000*60*60*24)) : null;
          const tempColor = tempDays !== null ? (tempDays<=7?'#e53935':tempDays<=30?'#F57C00':'inherit') : 'inherit';
          const fullColor = fullDays !== null ? (fullDays<=7?'#e53935':fullDays<=30?'#F57C00':'inherit') : 'inherit';
          const fmt = d => d ? new Date(d.toMillis()).toLocaleDateString('ja-JP') : '—';
          card.innerHTML = `
            <div class="course-icon">📋</div>
            <div class="course-info" style="gap:6px;">
              <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;">
                <div class="course-name">${data.course || 'オンライン初任者研修'}</div>
                <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;background:${sc.bg};border:1.5px solid ${sc.border};color:${sc.text};white-space:nowrap;">${statusText}</span>
              </div>
              <div class="course-meta">受講番号：${data.studentNo || '—'}</div>
              ${startDate ? '<div class="course-meta">受講開始日：' + startDate.toLocaleDateString('ja-JP') + '</div>' : ''}
              ${tempLimit ? '<div class="course-meta" style="color:' + (tempColor === 'inherit' ? 'var(--text-mid)' : tempColor) + ';">仮修了期限：' + tempLimit.toLocaleDateString('ja-JP') + (tempDays !== null ? '（残' + tempDays + '日）' : '') + '</div>' : ''}
              ${fullLimit ? '<div class="course-meta" style="color:' + (fullColor === 'inherit' ? 'var(--text-mid)' : fullColor) + ';">正式修了期限：' + fullLimit.toLocaleDateString('ja-JP') + (fullDays !== null ? '（残' + fullDays + '日）' : '') + '</div>' : ''}
              ${data.tempCompletedAt ? '<div class="course-meta" style="color:var(--text-mid);">仮修了日：' + fmt(data.tempCompletedAt) + '</div>' : ''}
              ${data.completedAt ? '<div class="course-meta" style="color:var(--text-mid);">修了日：' + fmt(data.completedAt) + '</div>' : ''}
            </div>
            <div class="course-arrow">›</div>
          `;
courseList.appendChild(card);
        });

        if (hiddenDocs.length > 0) {
          const moreBtn = document.createElement('button');
          moreBtn.textContent = `すべて表示（全${allDocs.length}件）`;
          moreBtn.style.cssText = 'width:100%; padding:12px; background:white; border:1.5px solid var(--border); border-radius:10px; color:var(--teal); font-size:13px; font-weight:700; cursor:pointer; font-family:"Noto Sans JP",sans-serif; margin-top:4px;';
          moreBtn.onclick = () => {
            hiddenDocs.forEach(doc => {
              const data = doc.data();
              const status = data.status || 'pending';
              const statusText = statusLabel[status] || status;
              const card = document.createElement('a');
              card.className = 'course-card';
              const courseCode = data.courseCode || '4010';
const m = courseMaster[courseCode];
card.href = `${m?.pageFile || 'mypage_course_shonin.html'}?id=${doc.id}`;
              const scH = statusColors[statusText] || {bg:'#F3F4F6',border:'#D1D5DB',text:'#6B7280'};
              const startH = data.activeAt ? new Date(data.activeAt.toMillis()) : null;
              const todayH = new Date(); todayH.setHours(0,0,0,0);
              const tempLH = startH ? new Date(new Date(startH).setMonth(startH.getMonth()+3)) : null;
              const fullLH = startH ? new Date(new Date(startH).setMonth(startH.getMonth()+8)) : null;
              const tempDH = tempLH ? Math.ceil((tempLH-todayH)/(1000*60*60*24)) : null;
              const fullDH = fullLH ? Math.ceil((fullLH-todayH)/(1000*60*60*24)) : null;
              const tempCH = tempDH!==null?(tempDH<=7?'#e53935':tempDH<=30?'#F57C00':'inherit'):'inherit';
              const fullCH = fullDH!==null?(fullDH<=7?'#e53935':fullDH<=30?'#F57C00':'inherit'):'inherit';
              const fmtH = d => d ? new Date(d.toMillis()).toLocaleDateString('ja-JP') : '—';
              card.innerHTML = `
                <div class="course-icon">📋</div>
                <div class="course-info" style="gap:6px;">
                  <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;">
                    <div class="course-name">${data.course || 'オンライン初任者研修'}</div>
                    <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;background:${scH.bg};border:1.5px solid ${scH.border};color:${scH.text};white-space:nowrap;">${statusText}</span>
                  </div>
                  <div class="course-meta">受講番号：${data.studentNo || '—'}</div>
                  ${startH ? '<div class="course-meta">受講開始日：' + startH.toLocaleDateString('ja-JP') + '</div>' : ''}
                  ${tempLH ? '<div class="course-meta" style="color:' + (tempColor === 'inherit' ? 'var(--text-mid)' : tempColor) + ';">仮修了期限：' + tempLH.toLocaleDateString('ja-JP') + (tempDH!==null?'（残'+tempDH+'日）':'') + '</div>' : ''}
                  ${fullLH ? '<div class="course-meta" style="color:' + (fullColor === 'inherit' ? 'var(--text-mid)' : fullColor) + ';">正式修了期限：' + fullLH.toLocaleDateString('ja-JP') + (fullDH!==null?'（残'+fullDH+'日）':'') + '</div>' : ''}
                  ${data.tempCompletedAt ? '<div class="course-meta" style="color:var(--text-mid);">仮修了日：' + fmtH(data.tempCompletedAt) + '</div>' : ''}
                  ${data.completedAt ? '<div class="course-meta" style="color:var(--text-mid);">修了日：' + fmtH(data.completedAt) + '</div>' : ''}
                </div>
                <div class="course-arrow">›</div>
              `;
              courseList.insertBefore(card, moreBtn);
            });
            moreBtn.remove();
          };
          courseList.appendChild(moreBtn);
        }
      }
} catch(e) {
      console.error('Firestoreエラー:', e.code, e.message);
      document.getElementById('course-list').innerHTML = '<div class="no-course">データの取得に失敗しました: ' + e.message + '</div>';
    }

    // お知らせをFirestoreから取得
    const noticeList = document.getElementById('notice-list');
    const uid = user.uid;
    const email = user.email;
    try {
      const { collection, query, where, orderBy, getDocs, or } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      const db = getFirestore();
      const q = query(
        collection(db, 'notices'),
        orderBy('createdAt', 'desc')
      );
      const snap = await getDocs(q);
      const notices = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(n => {
          if (n.target === 'all') return true;
          if (n.target === 'specific' && n.emails && n.emails.includes(email)) return true;
          if (n.target === 'selected' && n.targetUids && n.targetUids.includes(uid)) return true;
          return false;
        });

      if (notices.length === 0) {
        noticeList.innerHTML = '<div style="padding:20px;text-align:center;color:#aaa;font-size:13px;">お知らせはありません</div>';
        return;
      }

      // Firestoreから既読リストを取得
      const { getDocs: getDocs2, collection: col2 } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      const readSnap = await getDocs2(col2(db, 'users', uid, 'readNotices'));
      const readIds = readSnap.docs.map(d => d.id);

      let unreadCount = notices.filter(n => !readIds.includes(n.id)).length;
      if (unreadCount > 0) {
        document.getElementById('unread-count').textContent = unreadCount;
        document.getElementById('unread-count').style.display = 'inline';
      }

      // ページネーション
      const PER_PAGE = 5;
      let currentPage = 1;
      const totalPages = Math.ceil(notices.length / PER_PAGE);

      function renderNotices() {
        const start = (currentPage - 1) * PER_PAGE;
        const pageItems = notices.slice(start, start + PER_PAGE);

        noticeList.innerHTML = pageItems.map(n => {
          const isRead = readIds.includes(n.id);
          const dt = n.createdAt?.toDate?.() ? n.createdAt.toDate().toLocaleDateString('ja-JP') : '';
          const nid = 'nb-' + n.id;
          return `<div class="notice-accordion ${isRead ? '' : 'unread'}" id="ni-${n.id}">
            <button class="notice-accordion-header" onclick="toggleNotice('${n.id}');markRead('${n.id}', document.getElementById('ni-${n.id}'))">
              <span class="notice-unread-bar"></span>
              <span class="notice-acc-date">${dt}</span>
              <span class="notice-acc-title">${n.title}</span>
              <span class="notice-acc-arrow" id="na-${n.id}">▼</span>
            </button>
            <div class="notice-accordion-body" id="${nid}">
              <div>${n.body}</div>
              ${n.fileUrl ? '<a href="' + n.fileUrl + '" target="_blank" style="display:inline-block;margin-top:8px;font-size:12px;color:var(--teal-dark);">📎 ' + n.fileName + '</a>' : ''}
            </div>
          </div>`;
        }).join('');

        // ページネーションUI
        if (totalPages > 1) {
          let pagination = '<div style="display:flex;justify-content:center;align-items:center;gap:8px;padding:12px 0;">';
          pagination += `<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} style="padding:4px 12px;border:1px solid #ddd;border-radius:4px;background:${currentPage === 1 ? '#f5f5f5' : '#fff'};cursor:${currentPage === 1 ? 'default' : 'pointer'};color:#555;">‹ 前へ</button>`;
          for (let i = 1; i <= totalPages; i++) {
            pagination += `<button onclick="changePage(${i})" style="padding:4px 10px;border:1px solid ${i === currentPage ? 'var(--teal)' : '#ddd'};border-radius:4px;background:${i === currentPage ? 'var(--teal)' : '#fff'};color:${i === currentPage ? '#fff' : '#555'};cursor:pointer;">${i}</button>`;
          }
          pagination += `<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} style="padding:4px 12px;border:1px solid #ddd;border-radius:4px;background:${currentPage === totalPages ? '#f5f5f5' : '#fff'};cursor:${currentPage === totalPages ? 'default' : 'pointer'};color:#555;">次へ ›</button>`;
          pagination += '</div>';
          noticeList.innerHTML += pagination;
        }
      }
window.toggleSection = function(id) {
      const body = document.getElementById(id);
      const arrow = document.getElementById('arrow-' + id);
      if (!body) return;
      const isOpen = body.classList.contains('open');
      body.classList.toggle('open', !isOpen);
      if (arrow) arrow.classList.toggle('open', !isOpen);
    };
      window.changePage = function(page) {
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderNotices();
      };

      renderNotices();
    } catch(e) {
      noticeList.innerHTML = '<div style="padding:20px;text-align:center;color:#aaa;font-size:13px;">お知らせの取得に失敗しました</div>';
    }
  });
</script>

<script>
  async function doLogout() {
    await window.__signOut(window.__auth);
    window.location.href = 'mypage_login.html';
  }
  window.doLogout = doLogout;

  async function changePassword() {
    const pw1 = document.getElementById('new-pw').value;
    const pw2 = document.getElementById('new-pw2').value;
    const msg = document.getElementById('pw-msg');
    if (pw1.length < 8) { msg.style.display='block'; msg.style.color='#E05050'; msg.textContent='8文字以上で入力してください'; return; }
    if (pw1 !== pw2)    { msg.style.display='block'; msg.style.color='#E05050'; msg.textContent='パスワードが一致しません'; return; }
    try {
await window.__updatePassword(window.__auth.currentUser, pw1);
      // パスワード変更通知メール送信
      const user = window.__auth.currentUser;
      fetch('https://asia-northeast1-holiscare-academy.cloudfunctions.net/sendPasswordChangedMail', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: user.email, name: user.displayName || '' })
      });
      msg.style.display='block'; msg.style.color='#4CAF72'; msg.textContent='パスワードを変更しました！';
      document.getElementById('new-pw').value=''; document.getElementById('new-pw2').value='';
    } catch(e) {
      msg.style.display='block'; msg.style.color='#E05050'; msg.textContent='変更に失敗しました。再ログインしてお試しください。';
    }
  }
  window.changePassword = changePassword;

  // お知らせ既読管理
  window.toggleNotice = function(id) {
    const body = document.getElementById('nb-' + id);
    const arrow = document.getElementById('na-' + id);
    if (!body) return;
    const open = body.classList.contains('open');
    body.classList.toggle('open', !open);
    if (arrow) arrow.classList.toggle('open', !open);
  };

  window.markRead = async function(id, el) {
    try {
      const { getFirestore, doc, setDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      const db = getFirestore();
      const user = window.__auth?.currentUser;
      if (user) {
        await setDoc(doc(db, 'users', user.uid, 'readNotices', id), { readAt: new Date() });
      }
    } catch(e) {
      console.error('既読保存エラー:', e);
    }
    if (el) {
      el.classList.remove('unread');
      el.querySelector('.notice-dot').style.background = 'var(--border)';
    }
    const badge = document.getElementById('unread-count');
    if (badge && parseInt(badge.textContent) > 0) {
      const count = parseInt(badge.textContent) - 1;
      badge.textContent = count;
      badge.style.display = count > 0 ? 'inline' : 'none';
    }
  };
</script>

</body>
